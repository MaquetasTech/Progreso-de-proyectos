<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maquetas.tech — Producción</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eeecea;--surface:#fff;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --ok:#1a7a4a;--ok-light:#e6f5ed;--ok-border:#9dd4b4;--ok-pill:#d0edd9;
  --warn:#9a5500;--warn-light:#fff3e0;--warn-border:#f5cc7a;--warn-pill:#fde8b0;
  --red:#a81818;--red-light:#fdeaea;--red-border:#f0a0a0;--red-pill:#fad0d0;
  --crit:#7a0000;--crit-light:#f5d0d0;--crit-border:#d06060;--crit-pill:#f0b0b0;
  --n:#4a4a46;--n-light:#f5f4f1;--n-border:#dddbd6;
  --text:#1a1a18;--text2:#555;--text3:#999;
}
body{background:var(--bg);font-family:var(--font);font-size:15px;min-height:100vh;padding:18px 26px;color:var(--text)}

#setup-screen{display:none;max-width:440px;margin:60px auto;background:var(--surface);border-radius:12px;padding:28px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
#setup-screen h1{font-size:18px;font-weight:500;margin-bottom:6px}
#setup-screen p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.field input{width:100%;background:#f8f7f5;border:1px solid var(--n-border);border-radius:6px;padding:8px 11px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none}
.field input:focus{border-color:var(--ok)}
.setup-btn{width:100%;padding:10px;background:var(--ok);border:none;border-radius:6px;color:#fff;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;margin-top:4px}
.setup-note{font-size:11px;color:var(--text3);margin-top:8px;text-align:center}

#dashboard-screen{display:none}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #d0cdc8}
.logo p{font-size:15px;font-weight:600;color:var(--text)}
.logo small{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)}
.hbtns{display:flex;align-items:center;gap:8px}
#last-update{font-size:10px;color:var(--text3);font-family:var(--mono);margin-right:4px}
.btn-ghost{background:none;border:1px solid #d0cdc8;color:var(--text2);padding:6px 12px;border-radius:6px;cursor:pointer;font-family:var(--font);font-size:12px;display:flex;align-items:center;gap:5px;transition:all 0.15s}
.btn-ghost:hover{border-color:var(--ok);color:var(--ok)}
.btn-xs{background:none;border:none;color:var(--text3);font-size:10px;cursor:pointer;font-family:var(--font)}
.btn-xs:hover{color:var(--red)}

.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.scard{border-radius:8px;padding:14px 18px;border:1px solid var(--n-border);background:var(--surface)}
.scard-label{font-size:13px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--text2);margin-bottom:6px}
.scard-value{font-size:36px;font-weight:400;font-family:var(--mono);letter-spacing:-0.03em;line-height:1}
.scard-sub{font-size:13px;color:var(--text3);margin-top:4px;font-weight:500}
.scard.ok{background:var(--ok-light);border-color:var(--ok-border)}.scard.ok .scard-label,.scard.ok .scard-value,.scard.ok .scard-sub{color:var(--ok)}
.scard.danger{background:var(--red-light);border-color:var(--red-border)}.scard.danger .scard-label,.scard.danger .scard-value,.scard.danger .scard-sub{color:var(--red)}

.projects{display:flex;flex-direction:column;gap:8px}
.pcard{background:var(--surface);border:1px solid #dddbd6;border-radius:8px;padding:14px 20px;display:grid;grid-template-columns:200px 1fr 120px 95px 140px;align-items:center;gap:16px}
.pcard:hover{border-color:#c0bdb8;box-shadow:0 1px 4px rgba(0,0,0,0.06)}

/* nombre */
.pname{font-size:18px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pid{font-size:11px;font-family:var(--mono);color:var(--text3)}

/* barra */
.bar-labels{display:flex;justify-content:space-between;font-size:13px;font-family:var(--mono);margin-bottom:5px;font-weight:600}
.bar-labels .bl-left{color:var(--text2)}
.bar-labels .bl-right{color:var(--text2)}
.bar-labels .bl-over{color:var(--red);font-weight:800}
.bar-track{height:10px;background:#ece9e4;border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px}
.bar-fill.ok{background:#2d9e62}
.bar-fill.warn{background:#d98a00}
.bar-fill.over{background:#c83030}
.bar-crit{font-size:12px;margin-top:5px;color:var(--red);font-weight:700;display:flex;align-items:center;gap:4px}

/* pills estado */
.pill{display:inline-flex;align-items:center;justify-content:center;padding:7px 14px;border-radius:8px;font-size:15px;font-weight:800;font-family:var(--mono);white-space:nowrap;border:2px solid transparent}
.pill.ok{background:var(--ok-pill);color:var(--ok);border-color:var(--ok-border)}
.pill.warn{background:var(--warn-pill);color:var(--warn);border-color:var(--warn-border)}
.pill.over{background:var(--red-pill);color:var(--red);border-color:var(--red-border)}
.pill.crit{background:var(--crit-pill);color:var(--crit);border-color:var(--crit-border)}
.pill.gray{background:var(--n-light);color:var(--text3);border-color:var(--n-border)}

/* prioridad */
.ptag{display:inline-block;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:0.02em;border:2px solid transparent;text-align:center}
.ptag.max{background:#fde8e8;color:#7a0000;border-color:#d06060}
.ptag.alta{background:#faeeda;color:#7a3d00;border-color:#f5b84a}
.ptag.med{background:var(--ok-pill);color:var(--ok);border-color:var(--ok-border)}
.ptag.baja{background:#e8eef4;color:#1a3a5c;border-color:#8ab0d0}
.ptag.none{background:var(--n-light);color:var(--text3);border-color:var(--n-border)}

/* fecha — grande y llamativa */
.pdate-val{font-size:17px;font-weight:800;font-family:var(--mono);padding:7px 11px;border-radius:8px;display:inline-block;border:2px solid transparent;text-align:right;letter-spacing:-0.01em;line-height:1}
.pdate-val.ok{background:var(--ok-pill);color:var(--ok);border-color:var(--ok-border)}
.pdate-val.warn{background:var(--warn-pill);color:var(--warn);border-color:var(--warn-border)}
.pdate-val.red{background:var(--red-pill);color:var(--red);border-color:var(--red-border)}
.pdate-days{font-size:12px;color:var(--text3);margin-top:3px;text-align:right;font-weight:700}
.pdate-days.urgent{color:var(--red)}
.pdate-days.soon{color:var(--warn)}

#status-msg{text-align:center;padding:50px;color:var(--text3);font-size:14px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ok);margin-right:6px;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
#footer-ts{font-size:10px;color:var(--text3);text-align:right;margin-top:10px}

@media(max-width:1000px){
  body{padding:12px}
  .summary{grid-template-columns:1fr 1fr}
  .pcard{grid-template-columns:1fr;gap:10px}
  .pdate-val,.pdate-days{text-align:left}
}
</style>
</head>
<body>

<div id="setup-screen">
  <h1>Configuración inicial</h1>
  <p>Introduce las claves de acceso. Se guardarán en este navegador.</p>
  <div class="field"><label>Trello API Key</label><input type="password" id="input-trello-key" autocomplete="off"></div>
  <div class="field"><label>Trello Token</label><input type="password" id="input-trello-token" autocomplete="off"></div>
  <div class="field"><label>Clockify API Key</label><input type="password" id="input-clockify-key" autocomplete="off"></div>
  <button class="setup-btn" onclick="saveAndStart()">Guardar y abrir dashboard</button>
  <p class="setup-note">Las claves se guardan solo en este dispositivo.</p>
</div>

<div id="dashboard-screen">
  <header>
    <div class="logo">
      <small>Panel de control</small>
      <p>Proyectos en producción</p>
    </div>
    <div class="hbtns">
      <span id="last-update"></span>
      <button class="btn-xs" onclick="resetConfig()">Cambiar claves</button>
      <button class="btn-ghost" onclick="loadDashboard()" id="refresh-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        Actualizar
      </button>
    </div>
  </header>

  <div class="summary">
    <div class="scard" id="sc0"><p class="scard-label">Proyectos activos</p><p class="scard-value" id="s-total">—</p></div>
    <div class="scard" id="sc1"><p class="scard-label">En plazo</p><p class="scard-value" id="s-ok">—</p><p class="scard-sub" id="s-ok-sub"></p></div>
    <div class="scard" id="sc2"><p class="scard-label">Pasados de horas</p><p class="scard-value" id="s-alert">—</p><p class="scard-sub" id="s-alert-sub"></p></div>
  </div>

  <div id="projects-container">
    <div id="status-msg"><span class="dot"></span>Cargando...</div>
  </div>
  <p id="footer-ts"></p>
</div>

<script>
const OVER_THRESHOLD = 60;
const WS_ID = '61b31bd753f40a3f6ce5ce55';

// Proyectos con filtro de fecha — solo cuentan horas desde la fecha indicada
const DATE_FILTERS = {
  'campus valdebernardo': '2026-01-01T00:00:00Z'
};

let TRELLO_KEY, TRELLO_TOKEN, CLOCKIFY_KEY;
let trelloProjects = [];

const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
const daysUntil = d => d ? Math.ceil((new Date(d)-new Date())/86400000) : null;
const fmtDate = d => d ? new Date(d).toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'2-digit'}) : null;

function parseDuration(iso){
  if(!iso) return 0;
  const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+(?:\.\d+)?)S)?/);
  if(!m) return 0;
  return Math.round((parseFloat(m[1]||0)*3600+parseFloat(m[2]||0)*60+parseFloat(m[3]||0))/3600);
}

function loadConfig(){
  TRELLO_KEY=localStorage.getItem('mq_trello_key');
  TRELLO_TOKEN=localStorage.getItem('mq_trello_token');
  CLOCKIFY_KEY=localStorage.getItem('mq_clockify_key');
  return TRELLO_KEY&&TRELLO_TOKEN&&CLOCKIFY_KEY;
}

function saveAndStart(){
  const k=document.getElementById('input-trello-key').value.trim();
  const t=document.getElementById('input-trello-token').value.trim();
  const c=document.getElementById('input-clockify-key').value.trim();
  if(!k||!t||!c){alert('Rellena los tres campos.');return}
  localStorage.setItem('mq_trello_key',k);
  localStorage.setItem('mq_trello_token',t);
  localStorage.setItem('mq_clockify_key',c);
  TRELLO_KEY=k;TRELLO_TOKEN=t;CLOCKIFY_KEY=c;
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('dashboard-screen').style.display='block';
  loadDashboard();
}

function resetConfig(){
  if(!confirm('¿Cambiar claves?'))return;
  localStorage.removeItem('mq_trello_key');
  localStorage.removeItem('mq_trello_token');
  localStorage.removeItem('mq_clockify_key');
  location.reload();
}

function setStatus(msg){document.getElementById('projects-container').innerHTML=`<div id="status-msg"><span class="dot"></span>${msg}</div>`;}

async function trelloFetch(path){
  const sep=path.includes('?')?'&':'?';
  return (await fetch('https://api.trello.com/1'+path+sep+`key=${TRELLO_KEY}&token=${TRELLO_TOKEN}`)).json();
}

async function getHoursFromEntries(projectId, fromDate){
  // Obtener horas desde una fecha concreta via time-entries
  let page=1, total=0;
  while(true){
    const url=`https://api.clockify.me/api/v1/workspaces/${WS_ID}/time-entries?project=${projectId}&start=${fromDate}&page-size=200&page=${page}`;
    const entries=await fetch(url,{headers:{'X-Api-Key':CLOCKIFY_KEY}}).then(r=>r.json());
    if(!Array.isArray(entries)||entries.length===0) break;
    for(const e of entries){
      if(e.timeInterval&&e.timeInterval.duration){
        total+=parseDuration(e.timeInterval.duration)*3600;
      }
    }
    if(entries.length<200) break;
    page++;
  }
  return Math.round(total/3600);
}

async function getClockifyHours(){
  const [active,archived]=await Promise.all([
    fetch(`https://api.clockify.me/api/v1/workspaces/${WS_ID}/projects?page-size=200&archived=false`,{headers:{'X-Api-Key':CLOCKIFY_KEY}}).then(r=>r.json()),
    fetch(`https://api.clockify.me/api/v1/workspaces/${WS_ID}/projects?page-size=200&archived=true`,{headers:{'X-Api-Key':CLOCKIFY_KEY}}).then(r=>r.json())
  ]);
  const all=[...(Array.isArray(active)?active:[]),...(Array.isArray(archived)?archived:[])];
  const map={};

  for(const p of all){
    const key=norm(p.name);
    if(DATE_FILTERS[key]){
      // Este proyecto usa filtro de fecha — llamamos a time-entries
      map[key]=await getHoursFromEntries(p.id, DATE_FILTERS[key]);
    } else {
      map[key]=parseDuration(p.duration);
    }
  }
  return map;
}

async function loadDashboard(){
  const btn=document.getElementById('refresh-btn');
  btn.style.opacity='0.4';btn.style.pointerEvents='none';
  try{
    setStatus('Conectando con Trello...');
    const boards=await trelloFetch('/members/me/boards?fields=name,id');
    const board=boards.find(b=>norm(b.name).includes('proyectos en produccion'));
    if(!board)throw new Error('Tablero no encontrado');

    const [cfs,cards]=await Promise.all([
      trelloFetch(`/boards/${board.id}/customFields`),
      trelloFetch(`/boards/${board.id}/cards?customFieldItems=true&fields=name,due,customFieldItems`)
    ]);

    const hoursField=cfs.find(f=>/tiempo|horas/i.test(f.name));
    const idField=cfs.find(f=>/id.?proyecto/i.test(f.name));
    const prioField=cfs.find(f=>/prioridad/i.test(f.name));

    trelloProjects=[];
    for(const card of cards){
      const cf=card.customFieldItems||[];
      const idItem=idField?cf.find(i=>i.idCustomField===idField.id):null;
      const hoursItem=hoursField?cf.find(i=>i.idCustomField===hoursField.id):null;
      const prioItem=prioField?cf.find(i=>i.idCustomField===prioField.id):null;
      const projectId=idItem?.value?.text?.trim()||null;
      if(!projectId)continue;
      const assigned=parseInt(hoursItem?.value?.number||0);
      let priority='';
      if(prioItem){
        if(prioItem.value?.text) priority=prioItem.value.text;
        else if(prioItem.idValue&&prioField.options){
          const opt=prioField.options.find(o=>o.id===prioItem.idValue);
          if(opt) priority=opt.value?.text||'';
        }
      }
      trelloProjects.push({name:card.name,projectId,assigned,due:card.due||null,priority});
    }

    setStatus('Cargando horas de Clockify...');
    const clockifyHours=await getClockifyHours();
    renderProjects(clockifyHours);

    const ts=new Date().toLocaleTimeString('es-ES');
    document.getElementById('last-update').textContent='Act. '+ts;
    document.getElementById('footer-ts').textContent='Última actualización: '+ts;
  }catch(err){
    setStatus('⚠ Error: '+err.message);console.error(err);
  }
  btn.style.opacity='';btn.style.pointerEvents='';
}

function prioClass(raw){
  const v=norm(raw||'');
  if(v.includes('max')) return ['max','Máxima'];
  if(v.includes('alt')) return ['alta','Alta'];
  if(v.includes('med')) return ['med','Media'];
  if(v.includes('baj')) return ['baja','Baja'];
  return ['none',raw||'—'];
}

function renderProjects(clockifyHours){
  if(!trelloProjects.length){setStatus('Sin proyectos con ID Proyecto en Trello.');return;}

  const enriched=trelloProjects.map(p=>{
    const key=norm(p.projectId);
    const consumed=clockifyHours[key]||0;
    const over=p.assigned>0?Math.max(0,consumed-p.assigned):0;
    const isCrit=over>OVER_THRESHOLD;
    const pct=p.assigned>0?Math.min(Math.round(consumed/p.assigned*100),100):0;
    return{...p,consumed,found:key in clockifyHours,over,isCrit,pct};
  });

  enriched.sort((a,b)=>(a.due?new Date(a.due):new Date('9999'))-(b.due?new Date(b.due):new Date('9999')));

  let cntOk=0,cntAlert=0;
  enriched.forEach(p=>{if(p.assigned>0){if(p.over>OVER_THRESHOLD)cntAlert++;else cntOk++;}});

  document.getElementById('s-total').textContent=enriched.length;
  document.getElementById('s-ok').textContent=cntOk;
  document.getElementById('s-ok-sub').textContent='de '+enriched.length+' proyectos';
  document.getElementById('s-alert').textContent=cntAlert;
  document.getElementById('s-alert-sub').textContent=cntAlert>0?'más de '+OVER_THRESHOLD+'h de desfase':'Sin desfases críticos';
  document.getElementById('sc1').className='scard'+(cntOk>0?' ok':'');
  document.getElementById('sc2').className='scard'+(cntAlert>0?' danger':'');

  let html='<div class="projects">';
  for(const p of enriched){
    const days=daysUntil(p.due);
    const dateStr=fmtDate(p.due);
    const dt=days===null?'':days===0?'hoy':days<0?`hace ${Math.abs(days)}d`:`en ${days}d`;
    const dtCls=days!==null&&days<=2?'urgent':days!==null&&days<=7?'soon':'';
    const barCls=p.isCrit||p.over>0?'over':p.pct>=70?'warn':'ok';

    let pillCls,pillTxt;
    if(!p.found){pillCls='gray';pillTxt='sin datos';}
    else if(p.assigned===0){pillCls='gray';pillTxt='sin horas';}
    else if(p.isCrit){pillCls='crit';pillTxt='⚠ +'+p.over+'h';}
    else if(p.over>0){pillCls='over';pillTxt='+'+p.over+'h';}
    else if(p.pct>=70){pillCls='warn';pillTxt=p.pct+'%';}
    else{pillCls='ok';pillTxt=p.pct+'%';}

    let dateCls='ok';
    if(days!==null){if(days<=2)dateCls='red';else if(days<=7&&p.pct<80)dateCls='warn';}

    const[pCls,pTxt]=prioClass(p.priority);

    html+=`
    <div class="pcard">
      <div>
        <div class="pname" title="${p.name}">${p.name}</div>
        <div class="pid">${p.projectId}</div>
      </div>
      <div>
        <div class="bar-labels">
          <span class="bl-left">${p.consumed}h consumidas</span>
          ${p.over>0
            ?`<span class="bl-over">+${p.over}h sobre presupuesto</span>`
            :p.assigned>0
              ?`<span class="bl-right">${Math.max(0,p.assigned-p.consumed)}h restantes de ${p.assigned}h</span>`
              :`<span class="bl-right">—</span>`}
        </div>
        <div class="bar-track"><div class="bar-fill ${barCls}" style="width:${p.pct}%"></div></div>
        ${p.isCrit?`<div class="bar-crit"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Desfase crítico: +${p.over}h</div>`:''}
      </div>
      <div style="text-align:center"><span class="pill ${pillCls}">${pillTxt}</span></div>
      <div style="text-align:center"><span class="ptag ${pCls}">${pTxt}</span></div>
      <div>
        ${dateStr
          ?`<div class="pdate-val ${dateCls}">${dateStr}</div><div class="pdate-days ${dtCls}">${dt}</div>`
          :`<div class="pdate-days" style="text-align:right">Sin fecha</div>`}
      </div>
    </div>`;
  }
  html+='</div>';
  document.getElementById('projects-container').innerHTML=html;
}

if(loadConfig()){
  document.getElementById('dashboard-screen').style.display='block';
  loadDashboard();
}else{
  document.getElementById('setup-screen').style.display='block';
}
</script>
</body>
</html>
