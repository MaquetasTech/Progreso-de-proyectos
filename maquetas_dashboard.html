<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maquetas.tech — Producción</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede8;
  --font:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;

  --ok:#1a7a4a;        --ok-mid:#2d9e62;    --ok-light:#e6f5ed;   --ok-border:#b8dfc9;
  --warn:#b56a00;      --warn-mid:#d98a00;  --warn-light:#fff3e0; --warn-border:#f5cc7a;
  --red:#b82020;       --red-mid:#d93030;   --red-light:#fdeaea;  --red-border:#f0a0a0;
  --crit:#7a0000;      --crit-mid:#a00000;  --crit-light:#f5d0d0; --crit-border:#d06060;
  --neutral:#4a4a46;   --neutral-light:#f5f4f1; --neutral-border:#dddbd6;
}

body{background:var(--bg);font-family:var(--font);font-size:15px;min-height:100vh;padding:28px 32px;color:#1a1a18}

/* ── SETUP ── */
#setup-screen{display:none;max-width:460px;margin:80px auto;background:#fff;border-radius:12px;padding:32px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
#setup-screen h1{font-size:20px;font-weight:500;margin-bottom:8px}
#setup-screen p{font-size:13px;color:#777;margin-bottom:24px;line-height:1.6}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#aaa;margin-bottom:5px}
.field input{width:100%;background:#f8f7f5;border:1px solid #e0ddd8;border-radius:6px;padding:9px 12px;color:#1a1a18;font-family:var(--mono);font-size:12px;outline:none}
.field input:focus{border-color:var(--ok)}
.setup-btn{width:100%;padding:11px;background:var(--ok);border:none;border-radius:6px;color:#fff;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;margin-top:4px}
.setup-note{font-size:11px;color:#bbb;margin-top:10px;text-align:center}

/* ── HEADER ── */
#dashboard-screen{display:none}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.logo h1{font-size:11px;font-weight:400;letter-spacing:0.14em;text-transform:uppercase;color:#b8a070;margin-bottom:2px}
.logo p{font-size:20px;font-weight:300;color:#1a1a18;letter-spacing:-0.01em}
.hbtns{display:flex;align-items:center;gap:10px}
#last-update{font-size:11px;color:#aaa;font-family:var(--mono);margin-right:4px}
.btn-ghost{background:none;border:1px solid #d0cdc8;color:#888;padding:7px 14px;border-radius:6px;cursor:pointer;font-family:var(--font);font-size:13px;display:flex;align-items:center;gap:6px;transition:all 0.15s}
.btn-ghost:hover{border-color:var(--ok);color:var(--ok)}
.btn-primary{background:var(--ok);border:none;color:#fff;padding:7px 14px;border-radius:6px;cursor:pointer;font-family:var(--font);font-size:13px;display:flex;align-items:center;gap:6px}
.btn-primary:hover{opacity:0.88}
.btn-danger{background:none;border:none;color:#ccc;font-size:11px;cursor:pointer;font-family:var(--font)}
.btn-danger:hover{color:var(--red)}
#csv-input{display:none}

/* ── CSV BANNER ── */
.csv-ok{background:var(--ok-light);border:1px solid var(--ok-border);border-radius:8px;padding:9px 16px;margin-bottom:20px;font-size:12px;color:var(--ok);display:flex;align-items:center;gap:10px}

/* ── SUMMARY CARDS ── */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.scard{border-radius:10px;padding:18px 20px;display:flex;flex-direction:column;gap:4px}
.scard-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.65;font-weight:500}
.scard-value{font-size:32px;font-weight:300;font-family:var(--mono);letter-spacing:-0.03em;line-height:1}
.scard-sub{font-size:12px;opacity:0.7;margin-top:2px}
.scard.neutral{background:var(--neutral-light);border:1px solid var(--neutral-border);color:var(--neutral)}
.scard.ok{background:var(--ok-light);border:1px solid var(--ok-border);color:var(--ok)}
.scard.warn{background:var(--warn-light);border:1px solid var(--warn-border);color:var(--warn)}
.scard.danger{background:var(--red-light);border:1px solid var(--red-border);color:var(--red)}

/* ── PROJECT CARDS ── */
.projects{display:flex;flex-direction:column;gap:10px}

.pcard{border-radius:10px;padding:18px 22px;display:grid;grid-template-columns:1fr 2fr auto auto auto;align-items:center;gap:20px;border:1.5px solid transparent}
.pcard.ok   {background:var(--ok-light);   border-color:var(--ok-border);  }
.pcard.warn {background:var(--warn-light);  border-color:var(--warn-border); }
.pcard.over {background:var(--red-light);   border-color:var(--red-border);  }
.pcard.crit {background:var(--crit-light);  border-color:var(--crit-border); }

/* nombre */
.pname{font-size:16px;font-weight:600;line-height:1.2;margin-bottom:3px}
.pid{font-size:11px;font-family:var(--mono);opacity:0.55}
.pcard.ok   .pname{color:var(--ok)}
.pcard.warn .pname{color:var(--warn)}
.pcard.over .pname{color:var(--red)}
.pcard.crit .pname,.pcard.crit .pid{color:var(--crit)}

/* barra */
.bar-wrap{}
.bar-labels{display:flex;justify-content:space-between;font-size:12px;font-family:var(--mono);margin-bottom:5px;font-weight:500}
.bar-track{height:8px;background:rgba(0,0,0,0.08);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.pcard.ok   .bar-fill{background:var(--ok-mid)}
.pcard.warn .bar-fill{background:var(--warn-mid)}
.pcard.over .bar-fill{background:var(--red-mid)}
.pcard.crit .bar-fill{background:var(--crit-mid)}
.bar-over{font-size:11px;margin-top:5px;font-weight:600;display:flex;align-items:center;gap:4px}
.pcard.over .bar-over,.pcard.crit .bar-over{color:var(--red)}

/* prioridad */
.ptag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;letter-spacing:0.03em}
.pcard.ok   .ptag{background:rgba(26,122,74,0.15); color:var(--ok)}
.pcard.warn .ptag{background:rgba(181,106,0,0.15);  color:var(--warn)}
.pcard.over .ptag,.pcard.crit .ptag{background:rgba(184,32,32,0.15);color:var(--red)}

/* fecha */
.pdate{text-align:right;min-width:100px}
.pdate-val{font-size:15px;font-weight:700;font-family:var(--mono);line-height:1.1}
.pdate-days{font-size:11px;margin-top:2px;opacity:0.7;font-weight:500}
.pcard.ok .pdate-val{color:var(--ok)}
.pcard.warn .pdate-val{color:var(--warn)}
.pcard.over .pdate-val,.pcard.crit .pdate-val{color:var(--red)}

/* estado pill */
.pstatus{min-width:90px;text-align:center}
.spill{display:inline-block;font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;letter-spacing:0.02em}
.pcard.ok   .spill{background:var(--ok-mid);   color:#fff}
.pcard.warn .spill{background:var(--warn-mid);  color:#fff}
.pcard.over .spill{background:var(--red-mid);   color:#fff}
.pcard.crit .spill{background:var(--crit-mid);  color:#fff}

#status-msg{text-align:center;padding:60px;color:#aaa;font-size:15px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ok);margin-right:8px;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}

@media(max-width:1000px){
  body{padding:16px}
  .summary{grid-template-columns:1fr 1fr}
  .pcard{grid-template-columns:1fr;gap:12px}
  .pdate{text-align:left}
}
</style>
</head>
<body>

<div id="setup-screen">
  <h1>Configuración inicial</h1>
  <p>Introduce las claves de Trello. Se guardarán en este navegador.</p>
  <div class="field"><label>Trello API Key</label><input type="password" id="input-trello-key" autocomplete="off"></div>
  <div class="field"><label>Trello Token</label><input type="password" id="input-trello-token" autocomplete="off"></div>
  <button class="setup-btn" onclick="saveAndStart()">Guardar y abrir dashboard</button>
  <p class="setup-note">Solo se envían datos a Trello. Nada más.</p>
</div>

<div id="dashboard-screen">
  <header>
    <div class="logo">
      <h1>Panel de control</h1>
      <p>Proyectos en producción</p>
    </div>
    <div class="hbtns">
      <span id="last-update"></span>
      <button class="btn-danger" onclick="resetConfig()">Cambiar claves</button>
      <label class="btn-ghost" for="csv-input">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        CSV Clockify
      </label>
      <input type="file" id="csv-input" accept=".csv" onchange="handleCSV(event)">
      <button class="btn-ghost" onclick="loadDashboard()" id="refresh-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        Actualizar
      </button>
    </div>
  </header>

  <div id="csv-banner" style="display:none" class="csv-ok">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    <div><span id="csv-name"></span> &nbsp;·&nbsp; <span id="csv-date" style="opacity:0.7"></span></div>
  </div>

  <div class="summary">
    <div class="scard neutral" id="sc0"><p class="scard-label">Proyectos activos</p><p class="scard-value" id="s-total">—</p></div>
    <div class="scard" id="sc1"><p class="scard-label">En plazo</p><p class="scard-value" id="s-ok">—</p><p class="scard-sub" id="s-ok-sub"></p></div>
    <div class="scard" id="sc2"><p class="scard-label">Pasados de horas</p><p class="scard-value" id="s-alert">—</p><p class="scard-sub" id="s-alert-sub"></p></div>
    <div class="scard neutral" id="sc3"><p class="scard-label">Carga global</p><p class="scard-value" id="s-pct">—<span style="font-size:16px;font-family:var(--font)">%</span></p><p class="scard-sub" id="s-pct-sub"></p></div>
  </div>

  <div id="projects-container">
    <div id="status-msg"><span class="dot"></span>Cargando datos de Trello...</div>
  </div>
  <p style="font-size:11px;color:#bbb;text-align:right;margin-top:14px" id="footer-ts"></p>
</div>

<script>
const OVER_THRESHOLD = 60;

let TRELLO_KEY, TRELLO_TOKEN;
let clockifyHours = {};
let trelloProjects = [];

const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
const daysUntil = d => d ? Math.ceil((new Date(d)-new Date())/86400000) : null;
const fmtDate = d => d ? new Date(d).toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'2-digit'}) : null;

function loadConfig(){
  TRELLO_KEY = localStorage.getItem('mq_trello_key');
  TRELLO_TOKEN = localStorage.getItem('mq_trello_token');
  const saved = localStorage.getItem('mq_clockify_csv');
  if(saved){ try{ const o=JSON.parse(saved); clockifyHours=o.hours; showCSVBanner(o.filename,o.date); }catch(e){} }
  return TRELLO_KEY && TRELLO_TOKEN;
}

function saveAndStart(){
  const k=document.getElementById('input-trello-key').value.trim();
  const t=document.getElementById('input-trello-token').value.trim();
  if(!k||!t){alert('Rellena los dos campos.');return}
  localStorage.setItem('mq_trello_key',k); localStorage.setItem('mq_trello_token',t);
  TRELLO_KEY=k; TRELLO_TOKEN=t;
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('dashboard-screen').style.display='block';
  loadDashboard();
}

function resetConfig(){
  if(!confirm('¿Cambiar claves?'))return;
  localStorage.removeItem('mq_trello_key'); localStorage.removeItem('mq_trello_token');
  location.reload();
}

function handleCSV(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{ parseCSV(e.target.result,f.name); localStorage.setItem('mq_clockify_csv',JSON.stringify({hours:clockifyHours,filename:f.name,date:new Date().toLocaleString('es-ES')})); renderProjects(); };
  r.readAsText(f,'UTF-8');
}

function parseCSV(text,filename){
  clockifyHours={};
  for(const line of text.split('\n').slice(1)){
    if(!line.trim())continue;
    const cols=line.match(/(".*?"|[^,]+)(?=,|$)/g);
    if(!cols||cols.length<5)continue;
    const project=cols[0].replace(/"/g,'').trim();
    const decimal=parseFloat(cols[4].replace(/"/g,'').trim());
    if(!project||isNaN(decimal))continue;
    const key=norm(project);
    clockifyHours[key]=(clockifyHours[key]||0)+decimal;
  }
  showCSVBanner(filename,new Date().toLocaleString('es-ES'));
}

function showCSVBanner(filename,date){
  document.getElementById('csv-banner').style.display='flex';
  document.getElementById('csv-name').textContent=filename;
  document.getElementById('csv-date').textContent=date;
}

function setStatus(msg){ document.getElementById('projects-container').innerHTML=`<div id="status-msg"><span class="dot"></span>${msg}</div>`; }

async function trelloFetch(path){
  const sep=path.includes('?')?'&':'?';
  return (await fetch('https://api.trello.com/1'+path+sep+`key=${TRELLO_KEY}&token=${TRELLO_TOKEN}`)).json();
}

async function loadDashboard(){
  const btn=document.getElementById('refresh-btn');
  btn.style.opacity='0.4'; btn.style.pointerEvents='none';
  try{
    setStatus('Conectando con Trello...');
    const boards=await trelloFetch('/members/me/boards?fields=name,id');
    const board=boards.find(b=>norm(b.name).includes('proyectos en produccion'));
    if(!board)throw new Error('Tablero no encontrado');

    const [cfs,cards]=await Promise.all([
      trelloFetch(`/boards/${board.id}/customFields`),
      trelloFetch(`/boards/${board.id}/cards?customFieldItems=true&fields=name,due,customFieldItems`)
    ]);

    const hoursField=cfs.find(f=>/tiempo|horas/i.test(f.name));
    const idField=cfs.find(f=>/id.?proyecto/i.test(f.name));
    const prioField=cfs.find(f=>/prioridad/i.test(f.name));

    trelloProjects=[];
    for(const card of cards){
      const cf=card.customFieldItems||[];
      const idItem=idField?cf.find(i=>i.idCustomField===idField.id):null;
      const hoursItem=hoursField?cf.find(i=>i.idCustomField===hoursField.id):null;
      const prioItem=prioField?cf.find(i=>i.idCustomField===prioField.id):null;
      const projectId=idItem?.value?.text?.trim()||null;
      if(!projectId)continue;
      const assigned=parseInt(hoursItem?.value?.number||0);
      let priority='';
      if(prioItem){
        if(prioItem.value?.text) priority=prioItem.value.text;
        else if(prioItem.idValue&&prioField.options){
          const opt=prioField.options.find(o=>o.id===prioItem.idValue);
          if(opt) priority=opt.value?.text||'';
        }
      }
      trelloProjects.push({name:card.name,projectId,assigned,due:card.due||null,priority});
    }
    renderProjects();
    const ts=new Date().toLocaleTimeString('es-ES');
    document.getElementById('last-update').textContent='Act. '+ts;
    document.getElementById('footer-ts').textContent='Última actualización: '+ts;
  }catch(err){
    setStatus('⚠ Error: '+err.message); console.error(err);
  }
  btn.style.opacity=''; btn.style.pointerEvents='';
}

function cardClass(p,days){
  if(p.isCrit) return 'crit';
  if(p.over>0) return 'over';
  // warn si faltan ≤7 días y menos del 80% completado
  const pct=p.assigned>0?p.consumed/p.assigned*100:0;
  if(days!==null && days<=7 && pct<80) return 'warn';
  if(p.pct>=70) return 'warn';
  return 'ok';
}

function prioLabel(raw){
  const v=norm(raw||'');
  if(v.includes('max')) return 'Máxima';
  if(v.includes('alt')) return 'Alta';
  if(v.includes('med')) return 'Media';
  if(v.includes('baj')) return 'Baja';
  return raw||'—';
}

function renderProjects(){
  if(!trelloProjects.length){ setStatus('Sin proyectos con ID Proyecto en Trello.'); return; }

  const enriched=trelloProjects.map(p=>{
    const key=norm(p.projectId);
    const consumed=Math.round(clockifyHours[key]||0);
    const over=p.assigned>0?Math.max(0,consumed-p.assigned):0;
    const isCrit=over>OVER_THRESHOLD;
    const pct=p.assigned>0?Math.min(Math.round(consumed/p.assigned*100),100):0;
    return{...p,consumed,found:key in clockifyHours,over,isCrit,pct};
  });

  enriched.sort((a,b)=>(a.due?new Date(a.due):new Date('9999'))-(b.due?new Date(b.due):new Date('9999')));

  let totalA=0,totalC=0,cntOk=0,cntAlert=0;
  enriched.forEach(p=>{ totalA+=p.assigned; totalC+=p.consumed; if(p.assigned>0){if(p.over>OVER_THRESHOLD)cntAlert++;else cntOk++;} });
  const gPct=totalA>0?Math.round(totalC/totalA*100):0;

  document.getElementById('s-total').textContent=enriched.length;
  document.getElementById('s-ok').textContent=cntOk;
  document.getElementById('s-ok-sub').textContent='de '+enriched.length+' proyectos';
  document.getElementById('s-alert').textContent=cntAlert;
  document.getElementById('s-alert-sub').textContent=cntAlert>0?'más de '+OVER_THRESHOLD+'h de desfase':'Sin desfases críticos';
  document.getElementById('s-pct').innerHTML=`${gPct}<span style="font-size:16px;font-family:var(--font)">%</span>`;
  document.getElementById('s-pct-sub').textContent=totalC+'h de '+totalA+'h totales';

  const sc1=document.getElementById('sc1'); sc1.className='scard '+(cntOk>0?'ok':'neutral');
  const sc2=document.getElementById('sc2'); sc2.className='scard '+(cntAlert>0?'danger':'ok');
  const sc3=document.getElementById('sc3'); sc3.className='scard '+(gPct>100?'danger':gPct>80?'warn':'neutral');

  let html='<div class="projects">';
  for(const p of enriched){
    const days=daysUntil(p.due);
    const cls=cardClass(p,days);
    const dateStr=fmtDate(p.due);
    const dt=days===null?'':days===0?'hoy':days<0?`hace ${Math.abs(days)}d`:`en ${days}d`;

    let statusText;
    if(!p.found) statusText='sin datos';
    else if(p.assigned===0) statusText='sin horas';
    else if(p.isCrit) statusText=`⚠ +${p.over}h`;
    else if(p.over>0) statusText=`+${p.over}h`;
    else statusText=`${p.pct}%`;

    let barRight;
    if(p.over>0) barRight=`<span>+${p.over}h sobre presupuesto</span>`;
    else if(p.assigned>0) barRight=`<span>${Math.max(0,p.assigned-p.consumed)}h restantes de ${p.assigned}h</span>`;
    else barRight=`<span>—</span>`;

    html+=`
    <div class="pcard ${cls}">
      <div>
        <div class="pname">${p.name}</div>
        <div class="pid">${p.projectId}</div>
      </div>
      <div class="bar-wrap">
        <div class="bar-labels">
          <span>${p.consumed}h consumidas</span>
          ${barRight}
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${p.pct}%"></div></div>
        ${p.isCrit?`<div class="bar-over"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Desfase crítico: +${p.over}h sobre el presupuesto</div>`:''}
      </div>
      <div class="pstatus"><span class="spill">${statusText}</span></div>
      <div style="text-align:center"><span class="ptag">${prioLabel(p.priority)}</span></div>
      <div class="pdate">
        ${dateStr?`<div class="pdate-val">${dateStr}</div><div class="pdate-days">${dt}</div>`:'<div class="pdate-days">Sin fecha</div>'}
      </div>
    </div>`;
  }
  html+='</div>';
  document.getElementById('projects-container').innerHTML=html;
}

if(loadConfig()){
  document.getElementById('dashboard-screen').style.display='block';
  loadDashboard();
}else{
  document.getElementById('setup-screen').style.display='block';
}
</script>
</body>
</html>
